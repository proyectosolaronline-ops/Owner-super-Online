<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Clientes — LandingKit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f4f0;--surface:#fff;--surface2:#f9f9f6;--border:#e8e8e2;
  --accent2:#6366f1;--text:#1a1a1a;--muted:#888;
  --danger:#ef4444;--warn:#f59e0b;--success:#16a34a;
  --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:30px}

.no-session{position:fixed;inset:0;background:#1a1a1a;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:24px;text-align:center}
.no-session.show{display:flex}
.no-session-title{font-family:var(--font-d);font-size:18px;font-weight:800;color:#fff}
.no-session-sub{font-size:13px;color:#555;line-height:1.5}
.no-session-btn{padding:12px 24px;background:var(--accent2);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-b)}

.app{display:none;flex-direction:column;min-height:100vh}
.app.visible{display:flex}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:40;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;gap:10px}
.topbar-title{font-family:var(--font-d);font-size:15px;font-weight:800;flex:1}
.btn{padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font-b);display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.btn.primary{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:8px}
.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.wa{background:#25d366;color:#fff;border-color:#25d366}
.btn.full{width:100%}
.btn:disabled{opacity:.4;pointer-events:none}

/* CONTENT */
.content{padding:16px;flex:1}
.search-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--font-b);background:var(--surface);color:var(--text);margin-bottom:14px}
.search-input:focus{outline:none;border-color:var(--accent2)}

/* STATS */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.stat-val{font-family:var(--font-d);font-size:24px;font-weight:800}

/* LISTA */
.tbl-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:1.5px solid var(--border);background:var(--surface2)}
td{padding:11px 12px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:var(--surface2)}

/* BADGE */
.filter-chip{flex-shrink:0;padding:5px 12px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);white-space:nowrap}
.filter-chip.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge.pending{background:#fef9c3;color:#854d0e}
.badge.confirmed{background:#dbeafe;color:#1e40af}
.badge.processing{background:#f3e8ff;color:#7e22ce}
.badge.shipped{background:#ffedd5;color:#9a3412}
.badge.delivered{background:#dcfce7;color:#166534}
.badge.cancelled{background:#fee2e2;color:#991b1b}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.modal-hdr{padding:16px 20px;border-bottom:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-family:var(--font-d);font-size:16px;font-weight:800}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-foot{padding:14px 20px;border-top:1.5px solid var(--border);display:flex;gap:8px}
.modal-foot .btn{flex:1}

/* DETALLE */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.detail-item .val{font-weight:600;font-size:13px;word-break:break-word}

/* HISTORIAL */
.historial-item{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.historial-id{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:3px}
.historial-total{font-family:var(--font-d);font-size:16px;font-weight:800;color:var(--accent2)}

/* EMPTY / SPINNER */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-ico{font-size:36px;margin-bottom:10px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.spinner-big{width:32px;height:32px;border-width:3px;margin:0 auto 14px;display:block}
@keyframes spin{to{transform:rotate(360deg)}}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);border-radius:10px;padding:11px 18px;font-size:13px;font-weight:600;z-index:9999;display:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.18)}
#toast.success{background:var(--success);color:#fff}
#toast.error{background:var(--danger);color:#fff}
#toast.warn{background:var(--warn);color:#fff}

@media(min-width:768px){
  .overlay{align-items:center}
  .modal{border-radius:14px;max-width:520px;width:100%}
}
</style>
</head>
<body>

<div class="no-session" id="no-session">
  <div class="no-session-title">Sesion no encontrada</div>
  <div class="no-session-sub">Accede primero desde el panel principal.</div>
  <button class="no-session-btn" onclick="history.back()">Volver al panel</button>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-title">Clientes</div>
    <button class="btn sm ghost" onclick="loadData()" title="Actualizar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
    </button>
    <button class="btn ghost sm" onclick="history.back()">Panel</button>
  </div>

  <div class="content">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total clientes</div>
        <div class="stat-val" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Este mes</div>
        <div class="stat-val" id="stat-mes">—</div>
      </div>
    </div>

    <input class="search-input" id="search-input" placeholder="Buscar por nombre o email..." oninput="renderLista()">

    <div class="tbl-wrap" id="clientes-wrap">
      <div class="empty"><div class="spinner spinner-big"></div></div>
    </div>
  </div>
</div>

<!-- MODAL DETALLE CLIENTE -->
<div class="overlay" id="modal-cliente">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modal-nombre">Cliente</div>
      <button class="btn ghost sm" onclick="closeModal('modal-cliente')">X</button>
    </div>
    <div class="modal-body">
      <!-- Datos -->
      <div class="detail-grid" id="detail-datos"></div>

      <!-- Acciones -->
      <div style="display:flex;gap:8px">
        <button class="btn wa full" id="btn-wa-cliente">WhatsApp</button>
        <button class="btn full" id="btn-email-cliente">Email</button>
      </div>

      <!-- Historial de compras -->
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Historial de compras</div>
        <div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;padding-bottom:4px;-webkit-overflow-scrolling:touch" id="historial-filtros">
          <div class="filter-chip active" data-status="" onclick="setHistorialFiltro(this,'')">Todos</div>
          <div class="filter-chip" data-status="pending"   onclick="setHistorialFiltro(this,'pending')">Pendiente</div>
          <div class="filter-chip" data-status="confirmed" onclick="setHistorialFiltro(this,'confirmed')">Confirmado</div>
          <div class="filter-chip" data-status="processing" onclick="setHistorialFiltro(this,'processing')">En proceso</div>
          <div class="filter-chip" data-status="shipped"   onclick="setHistorialFiltro(this,'shipped')">Enviado</div>
          <div class="filter-chip" data-status="delivered" onclick="setHistorialFiltro(this,'delivered')">Entregado</div>
          <div class="filter-chip" data-status="cancelled" onclick="setHistorialFiltro(this,'cancelled')">Cancelado</div>
        </div>
        <div id="historial-wrap"></div>
      </div>

      <!-- Resumen -->
      <div style="background:var(--surface2);border-radius:10px;padding:14px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:3px">Total comprado</div>
          <div style="font-family:var(--font-d);font-size:20px;font-weight:800;color:var(--accent2)" id="total-comprado">—</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--muted);margin-bottom:3px">Pedidos</div>
          <div style="font-family:var(--font-d);font-size:20px;font-weight:800" id="total-pedidos">—</div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn full" onclick="closeModal('modal-cliente')">Cerrar</button>
    </div>
  </div>
</div>

<!-- MODAL DETALLE PEDIDO -->
<div class="overlay" id="modal-pedido">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modal-pedido-id">Pedido</div>
      <button class="btn ghost sm" onclick="closeModal('modal-pedido')">X</button>
    </div>
    <div class="modal-body" id="modal-pedido-body"></div>
    <div class="modal-foot">
      <button class="btn full" onclick="closeModal('modal-pedido')">Cerrar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const BACKEND  = localStorage.getItem('ld_backend') || '';
const STORE_ID = localStorage.getItem('ld_store')   || '';
const TOKEN    = localStorage.getItem('ld_token')   || '';
let STORE_CFG  = {};
let HISTORIAL_FILTRO = '';
let CURRENT_CLIENTE_PEDIDOS = [];
let ALL_CLIENTES = [];
let ALL_ORDERS   = [];

// AUTH
window.addEventListener('load', function() {
  if (!TOKEN || !STORE_ID || !BACKEND) {
    document.getElementById('no-session').classList.add('show');
    return;
  }
  document.getElementById('app').classList.add('visible');
  loadData();
});

// Inactividad 30 min
var _inact;
function resetInact(){ clearTimeout(_inact); _inact=setTimeout(logout, 30*60*1000); }
['click','touchstart','keypress','scroll'].forEach(function(e){ document.addEventListener(e,resetInact,true); });
resetInact();
function logout(){
  ['ld_token','ld_store','ld_role','ld_backend'].forEach(function(k){ localStorage.removeItem(k); });
  location.href = 'panel-dueno.html';
}

// API
async function api(action, data) {
  data = data || {};
  try {
    var res = await fetch(BACKEND, {
      method: 'POST',
      headers: {'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(Object.assign({ action:action, storeId:STORE_ID, token:TOKEN }, data))
    });
    var json = await res.json();
    if (json.error) throw new Error(json.error);
    return json;
  } catch(e) { toast(e.message, 'error'); return null; }
}

// CARGAR DATOS
async function loadData() {
  document.getElementById('clientes-wrap').innerHTML = '<div class="empty"><div class="spinner spinner-big"></div></div>';
  var results = await Promise.all([api('customer.list'), api('order.list'), api('store.info')]);
  var cRes = results[0], oRes = results[1], iRes = results[2];
  if (cRes) ALL_CLIENTES = cRes.customers || [];
  if (oRes) ALL_ORDERS   = oRes.orders    || [];
  if (iRes) {
    STORE_CFG = iRes.store.config || {};
    document.getElementById('topbar-title') && (document.getElementById('topbar-title').textContent = (iRes.store.name||'') + ' - Clientes');
  }
  actualizarStats();
  renderLista();
}

function actualizarStats() {
  document.getElementById('stat-total').textContent = ALL_CLIENTES.length;
  var ahora = new Date();
  var mes = ahora.getMonth(), anio = ahora.getFullYear();
  var esteMes = ALL_CLIENTES.filter(function(c){
    if (!c.createdAt) return false;
    var d = new Date(c.createdAt);
    return d.getMonth()===mes && d.getFullYear()===anio;
  }).length;
  document.getElementById('stat-mes').textContent = esteMes;
}

// RENDER LISTA
function renderLista() {
  var q = (document.getElementById('search-input').value||'').toLowerCase();
  var lista = q ? ALL_CLIENTES.filter(function(c){
    return (c.name||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q) || (c.phone||'').includes(q);
  }) : ALL_CLIENTES;

  var wrap = document.getElementById('clientes-wrap');
  if (!lista.length) {
    wrap.innerHTML = '<div class="empty"><div class="empty-ico">👤</div><h3>Sin clientes</h3></div>';
    return;
  }

  wrap.innerHTML = '<table><thead><tr><th>Nombre</th><th>Contacto</th><th>Pedidos</th></tr></thead><tbody>' +
    lista.map(function(c) {
      var pedidos = ALL_ORDERS.filter(function(o){ return o.customerId===c.customerId || o.customerEmail===c.email; }).length;
      return '<tr class="clickable" data-id="' + esc(c.customerId) + '">' +
        '<td><div style="font-weight:600">' + esc(c.name||'—') + '</div><div style="font-size:11px;color:var(--muted)">' + esc(c.email||'') + '</div></td>' +
        '<td style="font-size:12px">' + esc(c.phone||'—') + '</td>' +
        '<td style="font-weight:700;color:var(--accent2)">' + pedidos + '</td>' +
      '</tr>';
    }).join('') + '</tbody></table>';

  wrap.querySelectorAll('tr.clickable').forEach(function(row) {
    row.addEventListener('click', function() {
      abrirCliente(this.getAttribute('data-id'));
    });
  });
}

// ABRIR DETALLE CLIENTE
function abrirCliente(customerId) {
  var c = ALL_CLIENTES.find(function(x){ return x.customerId===customerId; });
  if (!c) return;

  document.getElementById('modal-nombre').textContent = c.name || 'Cliente';
  document.getElementById('detail-datos').innerHTML =
    di('Email',     c.email    || '—') +
    di('Telefono',  c.phone    || '—') +
    di('Registro',  c.createdAt ? new Date(c.createdAt).toLocaleDateString('es-MX') : '—') +
    di('ID',        c.customerId || '—');

  // WhatsApp y Email
  var btnWA = document.getElementById('btn-wa-cliente');
  var btnEM = document.getElementById('btn-email-cliente');
  if (c.phone) {
    btnWA.onclick = function(){ window.open('https://wa.me/'+c.phone.replace(/\D/g,''), '_blank'); };
    btnWA.disabled = false;
  } else {
    btnWA.disabled = true;
  }
  if (c.email) {
    btnEM.onclick = function(){ window.open('mailto:'+c.email, '_blank'); };
    btnEM.disabled = false;
  } else {
    btnEM.disabled = true;
  }

  // Historial de compras
  var pedidos = ALL_ORDERS.filter(function(o){
    return o.customerId===c.customerId || o.customerEmail===c.email;
  });

  var totalComprado = pedidos.reduce(function(sum, o){ return sum + Number(o.total||0); }, 0);
  document.getElementById('total-comprado').textContent = fmt(totalComprado);
  document.getElementById('total-pedidos').textContent  = pedidos.length;

  // Guardar pedidos del cliente y resetear filtro
  CURRENT_CLIENTE_PEDIDOS = pedidos;
  HISTORIAL_FILTRO = '';
  document.querySelectorAll('#historial-filtros .filter-chip').forEach(function(c){ c.classList.remove('active'); });
  var allChip = document.querySelector('#historial-filtros .filter-chip[data-status=""]');
  if (allChip) allChip.classList.add('active');
  renderHistorial();

  document.getElementById('modal-cliente').classList.add('open');
}

// UTILS
function di(label, val) {
  return '<div class="detail-item"><div class="lbl">'+label+'</div><div class="val">'+esc(String(val))+'</div></div>';
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmt(n){
  return new Intl.NumberFormat('es-MX',{style:'currency',currency:STORE_CFG.currency||'MXN'}).format(Number(n||0));
}

function labelStatus(s){
  return {pending:'Pendiente',confirmed:'Confirmado',processing:'En proceso',shipped:'Enviado',delivered:'Entregado',cancelled:'Cancelado'}[s]||'Pendiente';
}

function toast(msg, type){
  type = type||'success';
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = type; el.style.display = 'block';
  clearTimeout(el._t); el._t = setTimeout(function(){ el.style.display='none'; }, 3500);
}

function setHistorialFiltro(el, status) {
  HISTORIAL_FILTRO = status;
  document.querySelectorAll('#historial-filtros .filter-chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  renderHistorial();
}

function renderHistorial() {
  var lista = HISTORIAL_FILTRO
    ? CURRENT_CLIENTE_PEDIDOS.filter(function(o){ return o.status===HISTORIAL_FILTRO; })
    : CURRENT_CLIENTE_PEDIDOS;
  var hw = document.getElementById('historial-wrap');
  if (!lista.length) {
    hw.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0">Sin pedidos' + (HISTORIAL_FILTRO ? ' en este estado' : '') + '</div>';
    return;
  }
  hw.innerHTML = lista.map(function(o) {
    var fecha = o.createdAt ? new Date(o.createdAt).toLocaleDateString('es-MX') : '—';
    return '<div class="historial-item" data-orderid="' + esc(o.orderId) + '" style="cursor:pointer;margin-bottom:8px">' +
      '<div>' +
        '<div class="historial-id">' + esc(o.orderId) + '</div>' +
        '<div style="font-size:12px;color:var(--muted)">' + fecha + '</div>' +
      '</div>' +
      '<div style="text-align:right">' +
        '<div class="historial-total">' + fmt(o.total) + '</div>' +
        '<span class="badge ' + (o.status||'pending') + '">' + labelStatus(o.status) + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
  hw.querySelectorAll('.historial-item').forEach(function(el){
    el.addEventListener('click', function(){ abrirPedido(this.getAttribute('data-orderid')); });
  });
}

function abrirPedido(orderId) {
  var o = ALL_ORDERS.find(function(x){ return x.orderId===orderId; });
  if (!o) return;

  document.getElementById('modal-pedido-id').textContent = orderId;

  // Parsear items igual que pedidos.html
  var items = Array.isArray(o.items)
    ? o.items
    : (typeof o.items==='string' ? JSON.parse(o.items||'[]') : []);

  var fecha = o.createdAt ? new Date(o.createdAt).toLocaleDateString('es-MX') : '—';

  var itemsHTML = items.length
    ? items.map(function(i){
        var name  = i.name  || i.productId || '—';
        var price = Number(i.price || 0);
        var qty   = Number(i.qty  || 1);
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">' +
          '<div style="flex:1">' +
            '<div style="font-weight:600;font-size:13px">' + esc(name) + '</div>' +
            '<div style="font-size:11px;color:var(--muted)">x' + qty + (price ? '  ' + fmt(price) + ' c/u' : '') + '</div>' +
          '</div>' +
          '<div style="font-weight:700;color:var(--accent2);font-size:13px">' + (price ? fmt(price*qty) : '') + '</div>' +
        '</div>';
      }).join('')
    : '<div style="color:var(--muted);font-size:13px;padding:8px 0">Sin detalle de productos</div>';

  document.getElementById('modal-pedido-body').innerHTML =
    '<div class="detail-grid" style="margin-bottom:14px">' +
      di('Cliente',  o.customerName  || '—') +
      di('Telefono', o.customerPhone || '—') +
      di('Email',    o.customerEmail || '—') +
      di('Fecha',    fecha) +
    '</div>' +
    (o.notes ? '<div style="background:#fef9c3;border-radius:8px;padding:9px 11px;font-size:13px;margin-bottom:12px">&#x1F4DD; ' + esc(o.notes) + '</div>' : '') +
    '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Productos</div>' +
    '<div style="background:var(--surface2);border-radius:8px;padding:11px;margin-bottom:12px">' + itemsHTML + '</div>' +
    '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--surface2);border-radius:10px;margin-bottom:12px">' +
      '<span style="font-weight:600">Total</span>' +
      '<span style="font-family:var(--font-d);font-size:20px;font-weight:800;color:var(--accent2)">' + fmt(o.total) + '</span>' +
    '</div>' +
    '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Estado actual</div>' +
    '<div><span class="badge ' + (o.status||'pending') + '" style="font-size:13px;padding:6px 14px">' + labelStatus(o.status) + '</span></div>' +
    (o.customerPhone
      ? '<a href="https://wa.me/' + o.customerPhone.replace(/[^0-9]/g,'') + '" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;background:#dcfce7;color:#166534;border-radius:10px;font-weight:700;font-size:14px;text-decoration:none;margin-top:8px">WhatsApp al cliente</a>'
      : '');

  document.getElementById('modal-pedido').classList.add('open');
}

function closeModal(id){ document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.overlay').forEach(function(o){
  o.addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open'); });
});
</script>
</body>
</html>
