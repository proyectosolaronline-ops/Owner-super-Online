<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Panel — LandingKit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f4f0;--surface:#fff;--surface2:#f9f9f6;--border:#e8e8e2;
  --accent:#1a1a1a;--accent2:#6366f1;--text:#1a1a1a;--muted:#888;
  --danger:#ef4444;--warn:#f59e0b;--success:#16a34a;
  --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:12px;--nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;min-height:-webkit-fill-available}

/* ── LOGIN ── */
.login-screen{position:fixed;inset:0;background:var(--accent);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;overflow-y:auto}
.login-wrap{width:100%;max-width:400px;padding:20px 0}
.login-brand{font-family:var(--font-d);font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#555;margin-bottom:24px;text-align:center}
.login-brand span{color:var(--accent2)}
.login-tabs{display:flex;background:#111;border-radius:10px;padding:4px;margin-bottom:16px}
.ltab{flex:1;padding:11px;text-align:center;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;color:#555;transition:all .15s}
.ltab.active{background:var(--accent2);color:#fff}
.login-card{background:var(--bg);border-radius:20px;padding:28px 24px}
.login-title{font-family:var(--font-d);font-size:22px;font-weight:800;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.5}
.lfield{margin-bottom:14px}
.lfield label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.lfield input,.lfield textarea{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:var(--font-b);background:var(--surface);color:var(--text)}
.lfield textarea{resize:none;min-height:80px;font-family:var(--mono);font-size:12px}
.lfield input:focus,.lfield textarea:focus{outline:none;border-color:var(--accent2)}
.lerr{font-size:13px;color:var(--danger);margin-bottom:12px;padding:10px 12px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;display:none}
.lbtn{width:100%;padding:15px;background:var(--accent2);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-b)}
.lbtn:disabled{opacity:.5}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;min-height:100vh;padding-bottom:var(--nav-h)}

/* topbar */
.topbar{position:sticky;top:0;z-index:40;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:10px}
.store-logo-mini{width:30px;height:30px;border-radius:8px;background:var(--accent2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.store-logo-mini img{width:100%;height:100%;object-fit:cover}
.store-logo-mini span{font-size:14px;font-weight:700;color:#fff}
.topbar-name{font-family:var(--font-d);font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.topbar-right{display:flex;align-items:center;gap:6px}

/* content */
.content{flex:1;padding:16px;overflow-y:auto}
.panel{display:none}.panel.active{display:block}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 0;cursor:pointer;color:var(--muted);position:relative;transition:color .15s}
.nav-item.active{color:var(--accent2)}
.nav-item svg{width:22px;height:22px}
.nav-item span{font-size:10px;font-weight:600}
.nav-dot{position:absolute;top:4px;right:calc(50% - 14px);width:7px;height:7px;border-radius:50%;background:var(--danger);display:none}
.nav-dot.show{display:block}

/* ── BUTTONS ── */
.btn{padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font-b);display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn.primary{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.btn.danger{color:var(--danger);border-color:#fecaca}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:8px}
.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.full{width:100%;justify-content:center}
.btn:disabled{opacity:.4;pointer-events:none}

/* ── STORE EDITOR (dashboard) ── */
.editor-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:18px;overflow:hidden}
.editor-card-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.editor-card-title{font-family:var(--font-d);font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.editor-body{padding:16px;display:flex;flex-direction:column;gap:14px}

/* preview */
.preview-card{border-radius:12px;overflow:hidden;border:1.5px solid var(--border);background:#fff}
.preview-banner{height:100px;background:#e0e7ff;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.preview-banner img{width:100%;height:100%;object-fit:cover}
.preview-logo-wrap{padding:0 14px;margin-top:-20px;position:relative;z-index:1}
.preview-logo{width:40px;height:40px;border-radius:9px;border:3px solid #fff;overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.preview-logo img{width:100%;height:100%;object-fit:cover}
.preview-info{padding:8px 14px 14px}
.preview-name{font-weight:800;font-size:15px;margin-bottom:3px}
.preview-desc{font-size:12px;color:#888;line-height:1.4;margin-bottom:8px}
.preview-tag{display:inline-flex;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
.preview-btn{display:block;width:100%;padding:10px;border-radius:8px;font-size:13px;font-weight:700;text-align:center;border:none;cursor:pointer;margin-top:8px}

/* img upload */
.img-upload-row{border:1.5px dashed var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:border-color .15s;position:relative;display:flex;align-items:center;gap:12px;background:var(--surface)}
.img-upload-row:hover,.img-upload-row:active{border-color:var(--accent2);background:var(--surface2)}
.img-upload-row input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-thumb{width:46px;height:46px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.img-upload-info{flex:1}
.img-upload-label{font-size:13px;font-weight:600;margin-bottom:2px}
.img-upload-hint{font-size:11px;color:var(--muted)}

/* color picker */
.color-row{display:flex;align-items:center;gap:8px}
.color-row input[type=color]{width:40px;height:38px;padding:3px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;flex-shrink:0}
.color-row input[type=text]{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--mono);color:var(--text);background:var(--surface)}
.color-row input:focus{outline:none;border-color:var(--accent2)}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.stat-val{font-family:var(--font-d);font-size:24px;font-weight:800;line-height:1}
.stat-sub{font-size:10px;color:var(--muted);margin-top:3px}
.c-indigo{color:var(--accent2)}.c-green{color:var(--success)}.c-orange{color:#f59e0b}

/* ── TABLE ── */
.tbl-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:1.5px solid var(--border);background:var(--surface2)}
td{padding:11px 12px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge.pending{background:#fef9c3;color:#854d0e}
.badge.confirmed{background:#dbeafe;color:#1e40af}
.badge.processing{background:#f3e8ff;color:#7e22ce}
.badge.shipped{background:#ffedd5;color:#9a3412}
.badge.delivered{background:#dcfce7;color:#166534}
.badge.cancelled{background:#fee2e2;color:#991b1b}
.badge.staff{background:#f3f4f6;color:#6b7280}

/* ── PROD GRID ── */
.prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.prod-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.prod-img{aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;position:relative}
.prod-img img{width:100%;height:100%;object-fit:cover}
.prod-inactive{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.prod-body{padding:9px 10px}
.prod-name{font-weight:700;font-size:12px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-cat{font-size:10px;color:var(--muted);margin-bottom:5px}
.prod-price{font-family:var(--font-d);font-size:15px;font-weight:800;color:var(--accent2)}
.prod-actions{display:flex;gap:4px;padding:8px 10px;border-top:1px solid var(--border)}

/* ── STAFF CARDS ── */
.staff-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.staff-avatar{width:38px;height:38px;border-radius:50%;background:#eef2ff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--accent2);flex-shrink:0}

/* ── MODALS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;padding:0}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.modal-hdr{padding:16px 20px 14px;border-bottom:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-family:var(--font-d);font-size:15px;font-weight:700}
.modal-body{padding:20px}
.modal-foot{padding:14px 20px;border-top:1.5px solid var(--border);display:flex;gap:8px}
.modal-foot .btn{flex:1;justify-content:center}

/* ── FORM ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--font-b);color:var(--text);background:var(--surface)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent2)}
.field textarea{resize:vertical;min-height:80px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── IMG TABS ── */
.img-tabs{display:flex;gap:6px;margin-bottom:10px}
.img-tab{flex:1;padding:9px;text-align:center;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted)}
.img-tab.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}

/* ── SETTINGS ── */
.settings-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.settings-card-title{font-family:var(--font-d);font-size:12px;font-weight:700;margin-bottom:14px;text-transform:uppercase;letter-spacing:.06em}

/* ── SECTION HDR ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-family:var(--font-d);font-size:14px;font-weight:700}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-ico{font-size:36px;margin-bottom:10px}
.empty h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.empty p{font-size:13px}

.spinner{width:17px;height:17px;border:2px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{border:none;border-top:1.5px solid var(--border);margin:14px 0}
.mono{font-family:var(--mono);font-size:12px}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%);border-radius:10px;padding:11px 18px;font-size:13px;font-weight:600;z-index:9999;display:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.18)}
#toast.success{background:var(--success);color:#fff}
#toast.error{background:var(--danger);color:#fff}
#toast.warn{background:var(--warn);color:#fff}

/* ── DESKTOP ── */
@media(min-width:768px){
  .app{flex-direction:row;padding-bottom:0}
  .bottom-nav{display:none}
  .sidebar-desktop{width:220px;min-height:100vh;background:var(--accent);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:50}
  .main-desktop{margin-left:220px;flex:1}
  .topbar{height:58px;padding:0 24px}
  .content{padding:24px}
  .stats-grid{grid-template-columns:repeat(4,1fr)}
  .prod-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .overlay{align-items:center}
  .modal{border-radius:14px;max-width:520px;width:100%}
  #toast{bottom:24px}
}
@media(max-width:767px){
  .sidebar-desktop{display:none}
  .main-desktop{margin-left:0}
}

/* DESKTOP sidebar styles */
.sb-logo{padding:22px 18px;border-bottom:1px solid #333}
.sb-brand{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#555}
.sb-name{font-family:var(--font-d);font-size:15px;font-weight:800;color:#fff;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-role{display:inline-flex;align-items:center;gap:5px;margin-top:6px;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.sb-role.owner{background:var(--accent2);color:#fff}
.sb-role.staff{background:#333;color:#aaa}
.sb-nav{padding:14px 10px;flex:1}
.sb-section{font-size:9px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.12em;padding:0 8px;margin:14px 0 5px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;font-size:13px;color:#666;cursor:pointer;transition:all .15s;margin-bottom:2px}
.sb-item:hover{background:#222;color:#fff}
.sb-item.active{background:var(--accent2);color:#fff}
.sb-item svg{width:15px;height:15px;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px}
.sb-foot{padding:14px;border-top:1px solid #222}
.sb-user{display:flex;align-items:center;gap:8px}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-wrap">
    <div class="login-brand">Landing<span>Kit</span></div>
    <div class="login-tabs">
      <div class="ltab active" id="tab-owner" onclick="switchLoginTab('owner')">Dueño</div>
      <div class="ltab" id="tab-staff" onclick="switchLoginTab('staff')">Operador</div>
    </div>
    <div class="login-card">
      <div id="login-owner-view">
        <div class="login-title">Accede a tu tienda</div>
        <div class="login-sub">Pega el código LK-... que recibiste por WhatsApp o email.</div>
        <div class="lfield">
          <label>Código de acceso</label>
          <textarea id="l-code" placeholder="LK-eyJzdG9yZUlk..."></textarea>
        </div>
        <div class="lerr" id="l-err-owner"></div>
        <button class="lbtn" id="l-btn-owner" onclick="doOwnerLogin()">Ingresar</button>
      </div>
      <div id="login-staff-view" style="display:none">
        <div class="login-title">Acceso operador</div>
        <div class="login-sub">Usa el email y contraseña que te dio el dueño.</div>
        <div class="lfield"><label>ID de la tienda</label><input id="l-staff-storeid" placeholder="store_abc123..."/></div>
        <div class="lfield"><label>Email</label><input type="email" id="l-staff-email" placeholder="tu@email.com"/></div>
        <div class="lfield"><label>Contraseña</label><input type="password" id="l-staff-pass" placeholder="••••••••"/></div>
        <div class="lerr" id="l-err-staff"></div>
        <button class="lbtn" id="l-btn-staff" onclick="doStaffLogin()">Ingresar</button>
      </div>
    </div>
  </div>
</div>

<!-- DESKTOP SIDEBAR -->
<nav class="sidebar-desktop" id="sidebar-desktop">
  <div class="sb-logo">
    <div class="sb-brand">LandingKit</div>
    <div class="sb-name" id="sb-name-d">Mi Tienda</div>
    <span class="sb-role owner" id="sb-role-d">Dueño</span>
  </div>
  <div class="sb-nav">
    <div class="sb-item active" onclick="showPanel('dashboard')" id="d-nav-dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard
    </div>
    <div class="sb-section">Catálogo</div>
    <div class="sb-item" onclick="showPanel('products')" id="d-nav-products">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>Productos
    </div>
    <div class="sb-section">Ventas</div>
    <div class="sb-item" onclick="showPanel('orders')" id="d-nav-orders">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 17H7A5 5 0 017 7h2M15 7h2a5 5 0 010 10h-2M8 12h8"/></svg>Pedidos
      <span class="sb-badge" id="d-orders-badge" style="display:none">0</span>
    </div>
    <div class="sb-item" onclick="showPanel('customers')" id="d-nav-customers">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Clientes
    </div>
    <div class="sb-section">Admin</div>
    <div class="sb-item owner-only" onclick="showPanel('staff')" id="d-nav-staff">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Operadores
    </div>
    <div class="sb-item owner-only" onclick="showPanel('settings')" id="d-nav-settings">
      <svg viewBox="0 0 24 24"
