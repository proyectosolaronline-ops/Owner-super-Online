<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Logo y Banner</title>
<style>
  body { font-family: sans-serif; background: #f4f4f0; padding: 16px; }
  .preview-card { border-radius: 12px; overflow: hidden; border: 1.5px solid #e8e8e2; background: #fff; margin-bottom: 20px; }
  .preview-banner { height: 100px; background: #e0e7ff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .preview-logo-wrap { padding: 0 14px; margin-top: -20px; position: relative; z-index: 1; }
  .preview-logo { width: 40px; height: 40px; border-radius: 9px; border: 3px solid #fff; overflow: hidden; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
  .preview-info { padding: 8px 14px 14px; }
  .preview-name { font-weight: 800; font-size: 15px; margin-bottom: 3px; }
  .preview-desc { font-size: 12px; color: #888; }
  .topbar { background: #fff; border: 1.5px solid #e8e8e2; padding: 0 16px; height: 54px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-radius: 10px; }
  .store-logo-mini { width: 30px; height: 30px; border-radius: 8px; background: #6366f1; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
</style>
</head>
<body>

<h2 style="font-size:16px;font-weight:800;margin-bottom:16px">Test Logo y Banner</h2>

<div class="topbar">
  <div class="store-logo-mini" id="topbar-logo"><span id="topbar-logo-letter">?</span></div>
  <div style="font-weight:700;font-size:14px" id="topbar-name">Cargando...</div>
</div>

<div class="preview-card">
  <div class="preview-banner" id="preview-banner"><span style="font-size:28px;opacity:.4">🖼️</span></div>
  <div class="preview-logo-wrap">
    <div class="preview-logo" id="preview-logo">🏪</div>
  </div>
  <div class="preview-info">
    <div class="preview-name" id="preview-name">Nombre de tu tienda</div>
    <div class="preview-desc" id="preview-desc">Descripción...</div>
  </div>
</div>

<script>
/* ── fixImgUrl EXACTAMENTE igual que tienda.html ── */
function fixImgUrl(url) {
  if (!url) return '';
  const m = url.match(/[?&]id=([\w-]+)/);
  if (m) return 'https://lh3.googleusercontent.com/d/' + m[1];
  return url;
}

/* ── window.load EXACTAMENTE igual que tienda.html ── */
window.addEventListener('load', async function() {
  var params   = new URLSearchParams(location.search);
  var BACKEND  = params.get('backend');
  var STORE_ID = params.get('store');

  if (!BACKEND || !STORE_ID) {
    document.getElementById('topbar-name').textContent = '⚠️ Agrega ?backend=URL&store=ID en la URL';
    return;
  }

  try {
    var r    = await fetch(BACKEND + '?action=store.info&storeId=' + STORE_ID);
    var data = await r.json();
    if (!data.ok || !data.store) { document.getElementById('topbar-name').textContent = 'Error al cargar'; return; }

    var s   = data.store;
    var cfg = s.config || {};

    document.getElementById('topbar-name').textContent        = s.name || 'Mi Tienda';
    document.getElementById('topbar-logo-letter').textContent = (s.name||'T')[0].toUpperCase();
    document.getElementById('preview-name').textContent       = s.name || 'Mi Tienda';
    document.getElementById('preview-desc').textContent       = cfg.description || '';

    /* BANNER — igual que tienda.html: CSS background-image */
    if (cfg.bannerUrl) {
      var bannerEl = document.getElementById('preview-banner');
      bannerEl.style.background = 'linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)), url('+fixImgUrl(cfg.bannerUrl)+') center/cover no-repeat';
      bannerEl.innerHTML = '';
    }

    /* LOGO — igual que tienda.html: img tag */
    if (cfg.logo) {
      var logoSrc = fixImgUrl(cfg.logo);

      /* preview logo */
      var previewLogo = document.getElementById('preview-logo');
      var logoImg = document.createElement('img');
      logoImg.src = logoSrc;
      logoImg.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:7px';
      previewLogo.innerHTML = '';
      previewLogo.appendChild(logoImg);

      /* topbar logo */
      var tl = document.getElementById('topbar-logo');
      tl.innerHTML = '<img src="'+logoSrc+'" style="width:100%;height:100%;object-fit:cover">';
    }

  } catch(e) {
    document.getElementById('topbar-name').textContent = 'Error: ' + e.message;
  }
});
</script>
</body>
</html>
