<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo - Google Sheets</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f4f0;--surface:#fff;--surface2:#f9f9f6;--border:#e8e8e2;
  --accent:#1a1a1a;--accent2:#6366f1;--text:#1a1a1a;--muted:#888;
  --danger:#ef4444;--warn:#f59e0b;--success:#16a34a;
  --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);padding:20px}
.btn{padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font-b);display:inline-flex;align-items:center;gap:6px}
.btn.primary{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.btn.danger{color:var(--danger);border-color:#fecaca}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:8px}
.btn.full{width:100%;justify-content:center}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-family:var(--font-d);font-size:14px;font-weight:700}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.prod-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.prod-img{aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;position:relative}
.prod-img img{width:100%;height:100%;object-fit:cover}
.prod-inactive{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.prod-body{padding:9px 10px}
.prod-name{font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-cat{font-size:10px;color:var(--muted);margin-bottom:5px}
.prod-price{font-family:var(--font-d);font-size:15px;font-weight:800;color:var(--accent2)}
.prod-actions{display:flex;gap:4px;padding:8px 10px;border-top:1px solid var(--border)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
.modal-hdr{padding:16px 20px;border-bottom:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:var(--font-d);font-size:15px;font-weight:700}
.modal-body{padding:20px}
.modal-foot{padding:14px 20px;border-top:1.5px solid var(--border);display:flex;gap:8px}
.modal-foot .btn{flex:1;justify-content:center}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--font-b);color:var(--text);background:var(--surface)}
.field textarea{resize:vertical;min-height:80px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.img-tabs{display:flex;gap:6px;margin-bottom:10px}
.img-tab{flex:1;padding:9px;text-align:center;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted)}
.img-tab.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.img-upload-row{border:1.5px dashed var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;position:relative;display:flex;align-items:center;gap:12px;background:var(--surface)}
.img-upload-row input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-thumb{width:46px;height:46px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.img-upload-info{flex:1}
.img-upload-label{font-size:13px;font-weight:600}
.img-upload-hint{font-size:11px;color:var(--muted)}
#search-products{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:14px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);border-radius:10px;padding:11px 18px;font-size:13px;font-weight:600;z-index:9999;display:none;box-shadow:0 8px 24px rgba(0,0,0,.18)}
#toast.success{background:var(--success);color:#fff}
#toast.error{background:var(--danger);color:#fff}
#toast.warn{background:var(--warn);color:#fff}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-ico{font-size:36px;margin-bottom:10px}
.spinner{width:17px;height:17px;border:2px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- HEADER CATÁLOGO -->
<div class="sec-hdr">
  <div class="sec-title">Productos</div>
  <button class="btn primary sm" onclick="openModal('add-product')">➕ Nuevo</button>
</div>

<!-- BUSCADOR -->
<input id="search-products" placeholder="Buscar productos..." oninput="filterProducts()">

<!-- GRID DE PRODUCTOS -->
<div class="prod-grid" id="prod-grid">
  <div style="grid-column:1/-1;text-align:center;padding:40px">
    <div class="spinner"></div>
    <p style="margin-top:10px">Cargando productos desde Google Sheets...</p>
  </div>
</div>

<!-- MODAL PRODUCTO -->
<div class="overlay" id="modal-add-product">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="prod-modal-title">Nuevo producto</div>
      <button class="btn ghost sm" onclick="closeModal('add-product')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-prod-id">
      
      <div class="field">
        <label>Nombre *</label>
        <input id="p-name" placeholder="Ej: Camisa de algodón">
      </div>
      
      <div class="field">
        <label>Descripción</label>
        <textarea id="p-desc" placeholder="Descripción del producto..."></textarea>
      </div>
      
      <div class="field-row">
        <div class="field">
          <label>Precio *</label>
          <input type="number" id="p-price" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="field">
          <label>Stock</label>
          <input type="number" id="p-stock" placeholder="0" min="0">
        </div>
      </div>
      
      <div class="field-row">
        <div class="field">
          <label>Categoría</label>
          <input id="p-cat" placeholder="Ropa, Electrónica...">
        </div>
        <div class="field">
          <label>Estado</label>
          <select id="p-active">
            <option value="true">Activo</option>
            <option value="false">Inactivo</option>
          </select>
        </div>
      </div>
      
      <div class="field">
        <label>Imagen</label>
        <div class="img-tabs">
          <div class="img-tab active" id="itab-url" onclick="switchImgTab('url')">🔗 URL</div>
          <div class="img-tab" id="itab-file" onclick="switchImgTab('file')">📷 Subir archivo</div>
        </div>
        
        <div id="img-url-view">
          <input id="p-img" placeholder="https://ejemplo.com/imagen.jpg">
        </div>
        
        <div id="img-file-view" style="display:none">
          <div class="img-upload-row">
            <input type="file" id="p-img-file" accept="image/*" onchange="handleImgFile(this)">
            <div class="img-thumb">
              <span id="prod-img-emoji">📷</span>
              <img id="img-preview" src="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:6px">
            </div>
            <div class="img-upload-info">
              <div class="img-upload-label">Toca para elegir imagen</div>
              <div class="img-upload-hint">JPG, PNG, WEBP — máx 5MB</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('add-product')">Cancelar</button>
      <button class="btn primary" onclick="saveProduct()" id="btn-save-prod">Guardar</button>
    </div>
  </div>
</div>

<!-- TOAST NOTIFICATIONS -->
<div id="toast"></div>

<script>
// ============================================
// CONFIGURACIÓN - TU URL YA ESTÁ INTEGRADA
// ============================================
const BACKEND = 'https://script.google.com/macros/s/AKfycbxrdW7sLSiJNq_XF_xDjDgBl2rJppwwoRsEe-mNE8G-2BWOcI7DpyJpQYsyN8M-x-I/exec';
const STORE_ID = 'store_' + Date.now();
const TOKEN = 'token_' + Date.now();
let ALL_PRODS = [];
let PENDING_IMG_B64 = '', PENDING_IMG_MIME = 'image/jpeg', PENDING_IMG_NAME = '';

// ============================================
// FUNCIONES API
// ============================================
async function postAPI(payload) {
  const res = await fetch(BACKEND, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  return res.json();
}

async function api(action, data) {
  data = data || {};
  try {
    var payload = Object.assign({ 
      action: action,
      storeId: STORE_ID,
      token: TOKEN 
    }, data);
    
    var json = await postAPI(payload);
    if (json.error) throw new Error(json.error);
    return json;
  } catch(e) { 
    toast(e.message, 'error'); 
    return null; 
  }
}

// ============================================
// CARGAR PRODUCTOS
// ============================================
async function loadProducts() {
  const res = await api('product.list', {});
  if (res && res.products) {
    ALL_PRODS = res.products;
    renderProducts(ALL_PRODS);
  } else {
    document.getElementById('prod-grid').innerHTML = '<div style="grid-column:1/-1" class="empty"><div class="empty-ico">📦</div><h3>Error cargando productos</h3><p>Verifica la conexión con Google Sheets</p></div>';
  }
}

// ============================================
// RENDERIZAR PRODUCTOS
// ============================================
function renderProducts(prods) {
  var g = document.getElementById('prod-grid');
  if (!prods || !prods.length) { 
    g.innerHTML = '<div style="grid-column:1/-1" class="empty"><div class="empty-ico">🛍</div><h3>Sin productos</h3><p>Agrega tu primer producto</p></div>'; 
    return; 
  }
  
  g.innerHTML = prods.map(function(p) {
    var active = p.active === true || p.active === 'TRUE' || p.active === true;
    return '<div class="prod-card">' +
      '<div class="prod-img">' + 
        (p.imageUrl ? '<img src="' + esc(p.imageUrl) + '" loading="lazy">' : '🛍') + 
        (!active ? '<div class="prod-inactive">INACTIVO</div>' : '') + 
      '</div>' +
      '<div class="prod-body">' +
        '<div class="prod-name">' + esc(p.name || '') + '</div>' +
        '<div class="prod-cat">' + esc(p.category || 'Sin categoría') + '</div>' +
        '<div class="prod-price">' + fmt(p.price) + '</div>' +
      '</div>' +
      '<div class="prod-actions">' +
        '<button class="btn sm" style="flex:1" onclick="editProduct(\'' + p.productId + '\')">Editar</button>' +
        '<button class="btn sm danger" onclick="deleteProduct(\'' + p.productId + '\')">🗑</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ============================================
// FILTRAR PRODUCTOS
// ============================================
function filterProducts() {
  var q = document.getElementById('search-products').value.toLowerCase();
  renderProducts(q ? ALL_PRODS.filter(function(p) { 
    return (p.name || '').toLowerCase().includes(q) || 
           (p.category || '').toLowerCase().includes(q); 
  }) : ALL_PRODS);
}

// ============================================
// MANEJO DE IMÁGENES
// ============================================
function switchImgTab(tab) {
  document.getElementById('itab-url').classList.toggle('active', tab === 'url');
  document.getElementById('itab-file').classList.toggle('active', tab === 'file');
  document.getElementById('img-url-view').style.display = tab === 'url' ? '' : 'none';
  document.getElementById('img-file-view').style.display = tab === 'file' ? '' : 'none';
  if (tab === 'url') PENDING_IMG_B64 = '';
}

function handleImgFile(input) {
  var file = input.files[0]; 
  if (!file) return;
  
  if (file.size > 5 * 1024 * 1024) { 
    toast('Imagen muy grande — máx 5MB', 'error'); 
    return; 
  }
  
  PENDING_IMG_MIME = file.type || 'image/jpeg'; 
  PENDING_IMG_NAME = file.name;
  
  var reader = new FileReader();
  reader.onload = function(e) {
    PENDING_IMG_B64 = e.target.result.split(',')[1];
    var img = document.getElementById('img-preview');
    img.src = e.target.result; 
    img.style.display = 'block';
    document.getElementById('prod-img-emoji').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ============================================
// CRUD DE PRODUCTOS
// ============================================
function editProduct(id) {
  var p = ALL_PRODS.find(function(x) { return x.productId === id; }); 
  if (!p) return;
  
  document.getElementById('prod-modal-title').textContent = 'Editar producto';
  document.getElementById('edit-prod-id').value = id;
  document.getElementById('p-name').value = p.name || '';
  document.getElementById('p-desc').value = p.description || '';
  document.getElementById('p-price').value = p.price || '';
  document.getElementById('p-stock').value = p.stock || 0;
  document.getElementById('p-cat').value = p.category || '';
  document.getElementById('p-img').value = p.imageUrl || '';
  document.getElementById('p-active').value = String(p.active === true || p.active === 'TRUE');
  
  switchImgTab('url'); 
  PENDING_IMG_B64 = '';
  openModal('add-product');
}

function clearProdForm() {
  document.getElementById('prod-modal-title').textContent = 'Nuevo producto';
  document.getElementById('edit-prod-id').value = '';
  ['p-name','p-desc','p-price','p-stock','p-cat','p-img'].forEach(function(id) { 
    document.getElementById(id).value = ''; 
  });
  document.getElementById('p-active').value = 'true';
  switchImgTab('url'); 
  PENDING_IMG_B64 = '';
  
  var img = document.getElementById('img-preview'); 
  img.style.display = 'none'; 
  img.src = '';
  document.getElementById('prod-img-emoji').style.display = '';
  document.getElementById('p-img-file').value = '';
}

async function saveProduct() {
  var editId = document.getElementById('edit-prod-id').value;
  var btn = document.getElementById('btn-save-prod');
  
  btn.disabled = true; 
  btn.innerHTML = '<span class="spinner"></span>';
  
  var data = {
    name: document.getElementById('p-name').value,
    description: document.getElementById('p-desc').value,
    price: document.getElementById('p-price').value,
    stock: document.getElementById('p-stock').value,
    category: document.getElementById('p-cat').value,
    active: document.getElementById('p-active').value === 'true'
  };
  
  if (PENDING_IMG_B64) {
    data.imageBase64 = PENDING_IMG_B64; 
    data.mimeType = PENDING_IMG_MIME; 
    data.fileName = PENDING_IMG_NAME;
  } else {
    data.imageUrl = document.getElementById('p-img').value;
  }
  
  var res = editId 
    ? await api('product.update', Object.assign({ productId: editId }, data)) 
    : await api('product.create', data);
  
  btn.disabled = false; 
  btn.textContent = 'Guardar';
  
  if (!res) return;
  
  closeModal('add-product');
  toast(editId ? 'Producto actualizado' : 'Producto creado ✅', 'success');
  clearProdForm();
  loadProducts();
}

async function deleteProduct(id) {
  if (!confirm('¿Eliminar este producto?')) return;
  
  var res = await api('product.delete', { productId: id });
  if (!res) return;
  
  toast('Producto eliminado', 'warn');
  loadProducts();
}

// ============================================
// UTILIDADES
// ============================================
function openModal(id) { 
  document.getElementById('modal-' + id).classList.add('open'); 
}

function closeModal(id) { 
  document.getElementById('modal-' + id).classList.remove('open'); 
}

function esc(s) { 
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); 
}

function fmt(n) {
  return new Intl.NumberFormat('es-MX', { 
    style: 'currency', 
    currency: 'MXN' 
  }).format(Number(n || 0));
}

function toast(msg, type) {
  type = type || 'success';
  var el = document.getElementById('toast');
  el.textContent = msg; 
  el.className = type; 
  el.style.display = 'block';
  clearTimeout(el._t); 
  el._t = setTimeout(function() { el.style.display = 'none'; }, 3500);
}

// Cerrar modal al hacer click fuera
document.querySelectorAll('.overlay').forEach(function(o) {
  o.addEventListener('click', function(e) { 
    if (e.target === o) o.classList.remove('open'); 
  });
});

// Cargar productos al iniciar
window.addEventListener('load', loadProducts);
</script>
</body>
</html>
'">🚀 Ejecutar Catálogo</button>
