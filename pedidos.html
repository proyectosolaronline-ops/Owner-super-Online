<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Logo y Banner — código exacto de tienda</title>
<style>
  body { font-family: sans-serif; background: #fafafa; margin: 0; }

  /* === EXACTAMENTE como en tienda.html === */
  .hero {
    background: #6366f1;
    padding: 64px 20px;
    color: #fff;
  }
  .hero h1 {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 14px;
  }
  .hero p {
    font-size: 16px;
    opacity: .85;
    margin-bottom: 28px;
  }
</style>
</head>
<body>

<!-- EXACTAMENTE como en tienda.html -->
<div class="hero" id="hero-el">
  <div class="hero-content">
    <h1 id="hero-title">Bienvenido</h1>
    <p id="hero-desc">Descripción de la tienda</p>
  </div>
</div>

<script>
/* ── EXACTAMENTE las funciones de tienda.html ── */

function fixImgUrl(url) {
  if (!url) return '';
  const m = url.match(/[?&]id=([\w-]+)/);
  if (m) return 'https://lh3.googleusercontent.com/d/' + m[1];
  return url;
}

function applyColor(hex) {
  document.documentElement.style.setProperty('--primary', hex);
}

/* ── SIMULANDO cfg que viene de la sheet ── */
/* Cambia estos valores por los reales de tu tienda  */
var cfg = {
  bannerUrl:    'PON_AQUI_URL_BANNER_DE_TU_SHEET',
  logo:         'PON_AQUI_URL_LOGO_DE_TU_SHEET',
  primaryColor: '#f97316',
  description:  'Accesorios y gadgets'
};
var storeName = 'store 324';

/* ── EXACTAMENTE el bloque window.load de tienda.html ── */
if (cfg.primaryColor) applyColor(cfg.primaryColor);

document.getElementById('hero-title').textContent = storeName;
if (cfg.description) document.getElementById('hero-desc').textContent = cfg.description;

// Banner hero — IGUAL que tienda.html
if (cfg.bannerUrl) {
  const heroEl = document.getElementById('hero-el');
  heroEl.style.background = `linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)), url(${fixImgUrl(cfg.bannerUrl)}) center/cover no-repeat`;
}

// Logo — IGUAL que tienda.html
if (cfg.logo) {
  const heroContent = document.querySelector('.hero-content');
  const logoEl = document.createElement('img');
  logoEl.src = fixImgUrl(cfg.logo);
  logoEl.alt = storeName;
  logoEl.style.cssText = 'height:48px;margin-bottom:16px;border-radius:8px;display:block';
  heroContent.insertBefore(logoEl, heroContent.firstChild);
}
</script>

</body>
</html>
