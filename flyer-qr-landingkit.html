<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Flyer QR — LandingKit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;600;700&family=Quicksand:wght@400;500;600;700&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* ══ VARIABLES ══ */
:root{
  --c1:#00d98b;--c1d:#009960;--c1l:#d0fdf0;
  --c-ink:#0f1117;--c-slate:#6b7280;--c-border:#b6f5d8;
  --font-head:'DM Serif Display',serif;
  --font-body:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--font-body);background:#dde3ea;min-height:100vh;}

/* ══ TOOLBAR ══ */
@media screen{
  #toolbar{
    position:sticky;top:0;z-index:100;
    background:rgba(15,17,23,.97);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,.07);
    padding:10px 20px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .tb-logo{
    font-family:var(--font-head);font-size:17px;
    color:var(--c1);margin-right:auto;letter-spacing:-.3px;
    display:flex;align-items:center;gap:8px;
  }
  .tb-logo-icon{
    width:28px;height:28px;background:var(--c1);border-radius:7px;
    display:flex;align-items:center;justify-content:center;
  }
  .tb-logo-icon svg{width:15px;height:15px;}
  .tb-pill{
    display:inline-flex;align-items:center;gap:6px;font-size:12px;
    color:#9ca3af;background:#1e2330;border:1px solid #2a2f3e;
    padding:5px 12px;border-radius:99px;
  }
  .dot-ok  {width:7px;height:7px;border-radius:50%;background:#22c55e;}
  .dot-err {width:7px;height:7px;border-radius:50%;background:#ef4444;}
  .dot-spin{width:7px;height:7px;border-radius:50%;background:var(--c1);animation:pulse .9s infinite;}
  .btn-t{
    padding:8px 16px;border-radius:9px;font-family:var(--font-body);
    font-size:13px;font-weight:600;cursor:pointer;border:none;
    display:inline-flex;align-items:center;gap:6px;transition:.15s;
  }
  .btn-edit{background:#1e2330;color:#e8ecf0;border:1.5px solid #2a2f3e;}
  .btn-edit:hover{border-color:var(--c1);color:var(--c1);}
  .btn-print{
    background:var(--c1);color:#000;
    box-shadow:0 3px 14px rgba(0,217,139,.3);
  }
  .btn-print:hover{background:var(--c1d);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
}

/* ══ WRAPPER ══ */
.page-wrap{display:flex;align-items:flex-start;justify-content:center;padding:28px 16px;}

/* ══ HOJA CARTA 215.9 × 279.4 mm ══ */
.sheet{
  width:215.9mm;height:279.4mm;background:#fff;
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  position:relative;box-shadow:0 12px 48px rgba(0,0,0,.22);overflow:hidden;
}

/* ══ TARJETA ══ */
.qr-card{
  position:relative;display:flex;flex-direction:column;
  align-items:center;padding:4mm 5mm 3mm;gap:1.5mm;
  overflow:hidden;background:#fff;border:.3px solid #dde5ee;
}

/* ── Nombre ── */
.c-nombre{
  font-family:var(--font-head);font-size:4.4mm;
  color:var(--c-ink);text-align:center;line-height:1.2;letter-spacing:-.3px;
}

/* ── Subtítulo ── */
.c-sub{font-size:2.5mm;color:var(--c-slate);text-align:center;}

/* ── Pill plan ── */
.c-esp{
  display:inline-flex;align-items:center;
  background:var(--c1l);color:var(--c1d);
  font-size:2mm;font-weight:700;letter-spacing:.7px;text-transform:uppercase;
  padding:.6mm 2.5mm;border-radius:99px;border:1px solid var(--c-border);
}

/* ── QR cuadrado 68×68mm ── */
.c-qr-wrap{
  width:68mm;height:68mm;flex-shrink:0;
  background:color-mix(in srgb,var(--c1l) 55%,#fff);
  border-radius:4mm;padding:2.5mm;
  display:flex;align-items:center;justify-content:center;
}
.c-qr-wrap canvas,.c-qr-wrap img{
  display:block!important;width:100%!important;height:auto!important;border-radius:1.5mm;
}

/* ── Datos ── */
.c-footer{width:100%;display:flex;flex-direction:column;gap:1mm;flex:1;justify-content:center;}
.c-row{display:flex;align-items:center;justify-content:center;gap:1.5mm;text-align:center;}
.c-ico{font-size:2.6mm;flex-shrink:0;}
.c-txt{font-size:2.4mm;font-weight:500;color:var(--c-ink);line-height:1.3;text-align:center;}

/* ── Banner ── */
.c-banner{
  width:100%;padding:2.5mm 3mm;border-radius:2mm;
  background:linear-gradient(135deg,var(--c1),var(--c1d));
  text-align:center;font-size:2.4mm;font-weight:700;color:#000;
  letter-spacing:.3px;line-height:1.5;word-break:break-word;
  white-space:normal;overflow:visible;position:relative;
}
.c-banner::before{
  content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:rgba(255,255,255,.15);pointer-events:none;
}

/* ── Marca ── */
.c-marca{
  font-size:1.8mm;
  color:color-mix(in srgb,var(--c-slate) 45%,transparent);
  text-align:center;letter-spacing:.5px;font-weight:600;text-transform:uppercase;
}

/* ══ GUÍAS CORTE ══ */
.cut-h{position:absolute;left:0;right:0;top:50%;height:0;border-top:1px dashed #b0bec5;z-index:20;pointer-events:none;}
.cut-v{position:absolute;top:0;bottom:0;left:50%;width:0;border-left:1px dashed #b0bec5;z-index:20;pointer-events:none;}
.cut-i{position:absolute;font-size:11px;color:#90a4ae;z-index:21;pointer-events:none;}
.ci-tl{top:calc(50% - 8px);left:3px;}
.ci-tr{top:calc(50% - 8px);right:3px;}
.ci-bl{bottom:3px;left:calc(50% - 5px);}
.ci-br{top:3px;right:calc(50% - 5px);}

/* ══ MODAL ══ */
#modal-edit{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(6px);z-index:500;align-items:center;justify-content:center;padding:20px;}
#modal-edit.on{display:flex;}
.edit-card{
  background:#181c25;border:1px solid #2a2f3e;border-radius:20px;padding:28px;
  width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.4);
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both;
}
.edit-card h3{font-family:var(--font-head);font-size:20px;color:var(--c1);margin-bottom:3px;}
.edit-card p{font-size:13px;color:#9ca3af;margin-bottom:18px;}
.ef{margin-bottom:14px;}
.ef label{
  display:block;font-size:11px;font-weight:700;color:#9ca3af;
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;
}
.ef textarea{
  width:100%;padding:10px 13px;border:1.5px solid #2a2f3e;border-radius:10px;
  font-family:var(--font-body);font-size:14px;outline:none;transition:.2s;
  background:#1e2330;color:#e8ecf0;resize:vertical;min-height:72px;
}
.ef textarea:focus{
  border-color:var(--c1);
  box-shadow:0 0 0 3px rgba(0,217,139,.12);
}
.ef-cnt{font-size:11px;color:#6b7280;margin-top:3px;text-align:right;}
.edit-btns{display:flex;gap:10px;margin-top:16px;}
.btn-save{
  flex:1;padding:12px;background:var(--c1);color:#000;border:none;
  border-radius:10px;font-family:var(--font-body);font-size:14px;font-weight:700;cursor:pointer;transition:.2s;
}
.btn-save:hover{background:var(--c1d);}
.btn-cancel{
  padding:12px 16px;background:none;border:1.5px solid #2a2f3e;
  border-radius:10px;font-family:var(--font-body);font-size:14px;color:#9ca3af;cursor:pointer;
}
.btn-cancel:hover{border-color:#9ca3af;color:#e8ecf0;}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:#181c25;color:#e8ecf0;border:1px solid #2a2f3e;
  padding:10px 20px;border-radius:11px;font-size:13px;font-weight:500;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-left:3px solid var(--c1);}
.toast.err{border-left:3px solid #f87171;}

@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}

/* ══ PRINT ══ */
@media print{
  @page{size:letter;margin:0;}
  html,body{background:#fff!important;margin:0!important;padding:0!important;}
  #toolbar,#modal-edit,.toast{display:none!important;}
  .page-wrap{padding:0!important;display:block!important;}
  .sheet{width:215.9mm!important;height:279.4mm!important;box-shadow:none!important;page-break-after:always;}
}
</style>
</head>
<body>

<div id="toolbar">
  <div class="tb-logo">
    <div class="tb-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    LandingKit · Flyer QR
  </div>
  <div class="tb-pill">
    <div class="dot-spin" id="sdot"></div>
    <span id="stxt">Cargando…</span>
  </div>
  <button class="btn-t btn-edit" onclick="abrirEditor()">✏️ Editar banner</button>
  <button class="btn-t btn-print" onclick="window.print()">🖨️ Imprimir / PDF</button>
</div>

<div class="page-wrap">
  <div class="sheet">
    <div class="qr-card" id="c0"></div>
    <div class="qr-card" id="c1"></div>
    <div class="qr-card" id="c2"></div>
    <div class="qr-card" id="c3"></div>
    <div class="cut-h"></div>
    <div class="cut-v"></div>
    <span class="cut-i ci-tl">✂</span>
    <span class="cut-i ci-tr">✂</span>
    <span class="cut-i ci-bl">✂</span>
    <span class="cut-i ci-br">✂</span>
  </div>
</div>

<!-- MODAL BANNER -->
<div id="modal-edit">
  <div class="edit-card">
    <h3>✏️ Editar banner</h3>
    <p>Texto de la franja inferior de cada tarjeta.</p>
    <div class="ef">
      <label>Mensaje</label>
      <textarea id="inp-banner" maxlength="180"
        oninput="document.getElementById('efcnt').textContent=this.value.length+'/180'"
        placeholder="🛒 Visita nuestra tienda · Envío gratis en tu primer pedido"></textarea>
      <div class="ef-cnt"><span id="efcnt">0</span>/180</div>
    </div>
    <div class="edit-btns">
      <button class="btn-save" onclick="guardarBanner()">💾 Aplicar</button>
      <button class="btn-cancel" onclick="cerrarEditor()">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════ PARAMS — mismos que tienda pública ════════════
var params   = new URLSearchParams(window.location.search);
var BACKEND  = params.get('backend') || '';
var STORE_ID = params.get('store')   || '';

// Fallback: si se pasa ?lic= (compatibilidad legado)
var LIC_LEGACY = params.get('lic') || '';

var CFG          = {};
var BANNER_TEXT  = '🛒 Visita nuestra tienda · Escanea y compra fácil';
var URL_QR       = '';
var PAL          = { c1:'#00d98b', c1d:'#009960', c1l:'#d0fdf0', ink:'#0f1117', slate:'#6b7280', border:'#b6f5d8' };

// ════════════ CARGA ════════════
function cargar() {
  setS('spin', 'Cargando…');

  // Sin parámetros → demo
  if (!BACKEND || !STORE_ID) {
    if (LIC_LEGACY) {
      // compatibilidad con flujo anterior (lic=)
      cargarLegacy();
      return;
    }
    setS('err', '⚠ Falta ?backend= y ?store=');
    renderCards(demo());
    return;
  }

  // ── Llamada al mismo backend de LandingKit ──
  fetch(BACKEND, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'store.getPublicConfig', storeId: STORE_ID })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    console.log('RESPUESTA BACKEND:', JSON.stringify(d));
    if (!d || d.error) {
      setS('err', d ? d.error : 'Sin respuesta');
      renderCards(demo());
      return;
    }
    var cfg = d.config || d.store || d;
    CFG = cfg;

    // Banner: prioridad → bannerMessage del config → default
    if (cfg.bannerMessage) BANNER_TEXT = cfg.bannerMessage;

    // URL QR apunta a la tienda pública con los mismos params
    URL_QR = BACKEND
      ? buildStoreUrl()
      : window.location.origin + '/tienda.html?store=' + encodeURIComponent(STORE_ID);

    setS('ok', cfg.name || cfg.storeName || STORE_ID);
    renderCards(cfg);
  })
  .catch(function(e) {
    console.warn('flyer LandingKit:', e);
    setS('err', 'Sin conexión');
    renderCards(demo());
  });
}

// Compatibilidad con flujo ?lic= del sistema anterior
function cargarLegacy() {
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwu7VVHC3RgS1fXwOtnh3ebHf4Md9xVmYF8cVZznKekPVEDj79izRcQmECYPH4GLIsG/exec';
  fetch(SCRIPT_URL + '?action=getCfgPublica&lic=' + encodeURIComponent(LIC_LEGACY))
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) { setS('err', 'No encontrado'); renderCards(demo()); return; }
      var cfg = d.cfg || {};
      CFG = cfg;
      if (cfg.banner_activo && cfg.banner_texto) BANNER_TEXT = cfg.banner_texto;
      URL_QR = window.location.href.split('flyer-qr')[0] + 'consultorio.html?lic=' + encodeURIComponent(LIC_LEGACY);
      setS('ok', cfg.nombre_com || LIC_LEGACY);
      renderCards(mapLegacy(cfg));
    })
    .catch(function() { setS('err', 'Sin conexión'); renderCards(demo()); });
}

// Mapeo de campos legacy → campos LandingKit
function mapLegacy(cfg) {
  return {
    name:        cfg.nombre_com || cfg.nombre_legal || '',
    logo:        cfg.logo || '',
    storeLocation: cfg.direccion || '',
    ownerPhone:  cfg.telefono || '',
    bannerMessage: cfg.banner_texto || ''
  };
}

function buildStoreUrl() {
  return BACKEND
    ? (function() {
        // Reconstruye la URL de tienda pública igual que el panel maestro
        // Busca si hay una STORE_BASE guardada — si no, usa el patrón conocido
        var base = params.get('storeBase') || '';
        if (base) return base + '?backend=' + encodeURIComponent(BACKEND) + '&store=' + encodeURIComponent(STORE_ID);
        // Fallback: URL directa con backend + store (el panel del dueño ya sabe abrirla así)
        return BACKEND + '?store=' + encodeURIComponent(STORE_ID);
      })()
    : '';
}

function setS(t, txt) {
  document.getElementById('sdot').className = t==='ok' ? 'dot-ok' : t==='err' ? 'dot-err' : 'dot-spin';
  document.getElementById('stxt').textContent = txt;
}

function demo() {
  return {
    name: 'Mi Tienda Demo',
    logo: '',
    storeLocation: 'Querétaro, México',
    ownerPhone: '+52 442 000 0000',
    bannerMessage: '🛒 Escanea y compra · Envío gratis en tu primer pedido'
  };
}

// ════════════ RENDER ════════════
function renderCards(cfg) {
  // Normaliza campos — soporta tanto nombres de LandingKit como legacy
  var nombre   = cfg.name       || cfg.storeName    || cfg.nombre_com || 'Mi Tienda';
  var logo     = cfg.logo       || cfg.logoUrl       || '';
  var ubicacion= cfg.storeLocation || cfg.direccion  || '';
  var telefono = cfg.ownerPhone  || cfg.telefono      || '';
  var plan     = cfg.plan        || '';

  // Iniciales para el centro del QR
  var partes = nombre.split(' ');
  var ini    = ((partes[0]||'')[0]||'').toUpperCase() + ((partes[1]||'')[0]||'').toUpperCase();

  // URL QR: si no se construyó aún, usar demo
  if (!URL_QR) URL_QR = window.location.href;

  // Banner: puede haber sido sobreescrito por config
  if (cfg.bannerMessage && cfg.bannerMessage !== BANNER_TEXT) BANNER_TEXT = cfg.bannerMessage;

  for (var i = 0; i < 4; i++) {
    document.getElementById('c' + i).innerHTML = mkHTML(nombre, plan, ubicacion, telefono, i);
  }
  setTimeout(function() {
    for (var i = 0; i < 4; i++) mkQR(i, logo, ini);
  }, 150);
}

// ════════════ HTML TARJETA ════════════
function mkHTML(nombre, plan, ubicacion, telefono, i) {
  var planLabels = {
    free:'Trial · 14 días', light:'Plan Light', standard:'Plan Standard', full:'Plan Full'
  };
  var planTxt = planLabels[plan] || plan || '';

  return (
    '<div class="c-nombre">' + esc(nombre) + '</div>'
  + '<div class="c-sub">📱 Escanea para visitar la tienda</div>'
  + (planTxt ? '<div class="c-esp">' + esc(planTxt) + '</div>' : '')
  + '<div class="c-qr-wrap"><div id="qr' + i + '"></div></div>'
  + '<div class="c-footer">'
  + (ubicacion ? '<div class="c-row"><div class="c-ico">📍</div><div class="c-txt">' + esc(ubicacion) + '</div></div>' : '')
  + (telefono  ? '<div class="c-row"><div class="c-ico">📞</div><div class="c-txt">' + esc(telefono)  + '</div></div>' : '')
  + '</div>'
  + '<div class="c-banner" id="bn' + i + '">' + esc(BANNER_TEXT) + '</div>'
  + '<div class="c-marca">LandingKit</div>'
  );
}

// ════════════ QR + LOGO CENTRAL ════════════
function mkQR(idx, logoSrc, ini) {
  var cont = document.getElementById('qr' + idx);
  if (!cont) return;
  cont.innerHTML = '';
  var SIZE = 320;
  var tmp  = document.createElement('div');
  tmp.style.cssText = 'position:fixed;bottom:-9999px;left:-9999px;visibility:hidden;';
  document.body.appendChild(tmp);
  try {
    new QRCode(tmp, {
      text: URL_QR, width: SIZE, height: SIZE,
      colorDark: PAL.ink || '#0f1117',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  } catch(e) { removeTmp(tmp); return; }

  setTimeout(function() {
    var qc  = tmp.querySelector('canvas');
    var qi  = tmp.querySelector('img');
    var src = qc ? qc.toDataURL('image/png') : (qi ? qi.src : null);
    if (!src) { removeTmp(tmp); return; }
    compositar(src, cont, idx, logoSrc, ini, tmp);
  }, 200);
}

function compositar(qrSrc, cont, idx, logoSrc, ini, tmp) {
  var SIZE = 320;
  var out  = document.createElement('canvas');
  out.width = SIZE; out.height = SIZE;
  var ctx  = out.getContext('2d');
  var base = new Image();
  base.onload = function() {
    ctx.drawImage(base, 0, 0, SIZE, SIZE);
    var cx = SIZE/2, cy = SIZE/2;
    var r  = Math.round(SIZE * 0.14);
    // halo blanco
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, r+5, 0, 2*Math.PI);
    ctx.fillStyle = '#ffffff'; ctx.fill();
    ctx.restore();

    if (logoSrc && logoSrc.length > 10) {
      var li = new Image();
      li.crossOrigin = 'anonymous';
      li.onload = function() {
        ctx.save();
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*Math.PI);
        ctx.clip();
        ctx.drawImage(li, cx-r, cy-r, r*2, r*2);
        ctx.restore();
        pintarAnillo(ctx, cx, cy, r);
        mostrar(out, cont, tmp);
      };
      li.onerror = function() { pintarIni(ctx, cx, cy, r, ini, out, cont, tmp); };
      li.src = logoSrc;
    } else {
      pintarIni(ctx, cx, cy, r, ini, out, cont, tmp);
    }
  };
  base.onerror = function() { removeTmp(tmp); };
  base.src = qrSrc;
}

function pintarAnillo(ctx, cx, cy, r) {
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*Math.PI);
  ctx.strokeStyle = PAL.c1; ctx.lineWidth = 4; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, r+4, 0, 2*Math.PI);
  ctx.strokeStyle = PAL.c1l; ctx.lineWidth = 2; ctx.stroke();
}

function pintarIni(ctx, cx, cy, r, ini, out, cont, tmp) {
  var g = ctx.createRadialGradient(cx-r*.25, cy-r*.25, 0, cx, cy, r);
  g.addColorStop(0, PAL.c1);
  g.addColorStop(1, PAL.c1d);
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*Math.PI);
  ctx.fillStyle = g; ctx.fill();
  ctx.fillStyle = '#000';
  var fs = Math.round(r * .88);
  ctx.font = 'bold ' + fs + 'px \'DM Serif Display\',serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText((ini || '?').slice(0, 2), cx, cy+2);
  ctx.restore();
  pintarAnillo(ctx, cx, cy, r);
  mostrar(out, cont, tmp);
}

function mostrar(canvas, cont, tmp) {
  removeTmp(tmp);
  canvas.style.cssText = 'display:block;border-radius:1.5mm;width:100%;height:auto;';
  cont.innerHTML = '';
  cont.appendChild(canvas);
}
function removeTmp(tmp) { try { document.body.removeChild(tmp); } catch(e) {} }

// ════════════ BANNER EDITOR ════════════
function abrirEditor() {
  document.getElementById('inp-banner').value = BANNER_TEXT;
  document.getElementById('efcnt').textContent = BANNER_TEXT.length + '/180';
  document.getElementById('modal-edit').classList.add('on');
  setTimeout(function() {
    var t = document.getElementById('inp-banner'); t.focus(); t.select();
  }, 200);
}
function cerrarEditor() { document.getElementById('modal-edit').classList.remove('on'); }
function guardarBanner() {
  var v = document.getElementById('inp-banner').value.trim();
  if (!v) { showToast('Escribe un mensaje', 'err'); return; }
  BANNER_TEXT = v;
  for (var i = 0; i < 4; i++) {
    var b = document.getElementById('bn' + i); if (b) b.textContent = v;
  }
  cerrarEditor(); showToast('✅ Banner actualizado', 'ok');
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') cerrarEditor();
  if (e.key === 'Enter' && document.getElementById('modal-edit').classList.contains('on')) {
    e.preventDefault(); guardarBanner();
  }
});

// ════════════ UTILS ════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
}
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (type||''); t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}
